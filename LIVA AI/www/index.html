<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LIVA</title>

    <!-- ai image icon-->
    <link rel="shortcut icon" href="assets/img/software-agent.png" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"></script>

    <!-- Textillate -->
    <link rel="stylesheet" href="assets/vendore/texllate/animate.css">
    <link rel="stylesheet" href="assets/vendore/texllate/textillate.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">


        <!-- LIVA main animation display -->
        <section id="Oval" class="mb-4">
            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="d-flex justify-content-center align-items-center" style="height:80vh;">

                        <canvas id="canvasOne" width="700" height="420" style="position: absolute;"></canvas>

                        <div id="LIVAsHood">
                            <div class="square">
                                <span class="circle"></span>
                                <span class="circle"></span>
                                <span class="circle"></span>
                            </div>
                        </div>

                    </div>
                    <h3 class="text-light text-center">!! LIVA IS READY !!</h3>
                    <h5 class="text-light text-center">Ask for anyth!ng</h5>

                    <div class="col-md-12 mt-4 pt-4">
                        <div class="text-center">
                            <div id="TextInput" class="d-flex">
                                <input type="text" class="input-field" name="chatbox" id="chatbox"
                                    placeholder="type here...">
                                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                <button id="ChatBtn" class="glow-on-hover"><i class="bi bi-chat-dots"></i></button>
                                <button id="SettingsBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-1 "></div>

            </div>

        </section>

        <!-- Siri Wave  display -->
        <section id="SiriWave" class="mb-4" hidden>

            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="d-flex justify-content-center align-item-center" style="height:100vh;">
                            <div class="">

                                <p class="text-start text-light mb-4 siri-message">
                                <h1 class="text-light text-center mb-4">Listening...</h1>
                                </p>


                                <div id="siri-container"></div>
                                <div class="siri-center"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>

        <!-- jQuery (ONLY ONE VERSION) -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

        <!-- Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Siri Wave -->
        <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

        <!-- Textillate -->
        <script src="assets/vendore/texllate/jquery.fittext.js"></script>
        <script src="assets/vendore/texllate/jquery.lettering.js"></script>
        <script src="https://jschr.github.io/textillate/jquery.textillate.js"></script>

        <!-- Your Scripts -->
        <script src="script.js"></script>

        <!---->
        <script src="main.js"></script>

        <!---->
        <script src="controller.js"></script>


        <!-- EEL Connection  to html and main.py file -->
        <script src="/eel.js"></script>

</body>

</html>
